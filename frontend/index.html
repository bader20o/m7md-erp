<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Service Center</title>

  <!-- Google Fonts: Space Grotesk for English, Readex Pro for Arabic -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Readex+Pro:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
    rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            bg: "var(--bg)",
            surface: "var(--surface)",
            border: "var(--border)",
            text: "var(--text)",
            muted: "var(--muted)",
            primary: "var(--primary)",
            "primary-hover": "var(--primary-hover)",
            danger: "var(--danger)",
            success: "var(--success)"
          },
          fontFamily: {
            heading: ["var(--font-heading)", "sans-serif"],
            sans: ["var(--font-body)", "sans-serif"]
          }
        }
      }
    };
  </script>

  <!-- Main Styles -->
  <link rel="stylesheet" href="/spa/src/styles/main.css">
</head>

<body class="bg-bg text-text antialiased">
  <!-- Global Loader -->
  <div id="global-loader"
    class="fixed inset-0 z-[100] bg-bg flex flex-col items-center justify-center transition-opacity duration-300">
    <div class="w-12 h-12 border-4 border-surface border-t-primary rounded-full animate-spin mb-4"></div>
    <p class="text-muted font-medium text-sm">Loading Application...</p>
  </div>

  <!-- App Mount Point -->
  <div id="app" class="min-h-screen flex flex-col relative w-full overflow-hidden"></div>

  <!-- Toasts Mount Point -->
  <div id="toast-container" class="fixed bottom-4 right-4 z-[9999] flex flex-col gap-2 pointer-events-none"></div>

  <script src="/spa/vendor/embla-carousel.js"></script>
  <script src="/spa/vendor/zxing-browser.js"></script>

  <!-- Main Entry Point -->
  <script type="module" src="/spa/src/main.js"></script>
</body>

</html>
